<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>TV Corporativa — Anca Soluções</title>
<meta name="theme-color" id="themeColorMeta" content="#4C8DF6" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="TV Anca" />
<link rel="manifest" href="manifest.json" />
<link rel="apple-touch-icon" href="icons/icon-180.png" />
<link rel="icon" href="icons/icon-192.png" />
<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700;800&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap');

/* ===== Design tokens — Material Design 3 inspired ===== */
:root{
  --accent:#4C8DF6;
  --accent-2:#8AB4FF;
  --on-accent:#FFFFFF;
  --font-scale:1;

  --bg-base:#F4F6FB;
  --bg-panel:#FFFFFF;
  --bg-panel-2:#EEF1F8;
  --glass: rgba(255,255,255,0.55);
  --glass-border: rgba(255,255,255,0.6);
  --text-primary:#1B1F24;
  --text-muted:#5C6470;
  --line: rgba(20,25,35,0.09);
  --shadow: 0 10px 30px -12px rgba(20,25,45,0.18);
}
html[data-mode="dark"]{
  --bg-base:#10131A;
  --bg-panel:#181C25;
  --bg-panel-2:#1F2430;
  --glass: rgba(30,34,44,0.55);
  --glass-border: rgba(255,255,255,0.08);
  --text-primary:#F2F3F7;
  --text-muted:#8B93A3;
  --line: rgba(255,255,255,0.09);
  --shadow: 0 10px 30px -12px rgba(0,0,0,0.5);
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;height:100%;background:var(--bg-base);}
body{
  font-family:'Inter',sans-serif;color:var(--text-primary);
  width:100vw;min-height:100vh;position:relative;overflow:hidden;
  transition:background 0.4s ease, color 0.4s ease;
}
.mono{font-family:'IBM Plex Mono',monospace;}
.display-face{font-family:'Poppins',sans-serif;}
button, select, input, textarea{font-family:'Inter',sans-serif;}

/* ===== Splash screen ===== */
#splash{
  position:fixed;inset:0;z-index:999;
  background:linear-gradient(160deg, var(--accent), var(--accent-2));
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;
  transition:opacity 0.5s ease, visibility 0.5s ease;
}
#splash.hide{opacity:0;visibility:hidden;pointer-events:none;}
#splashMark{
  width:88px;height:88px;border-radius:26px;background:rgba(255,255,255,0.18);
  display:flex;align-items:center;justify-content:center;
  font-family:'Poppins',sans-serif;font-weight:800;font-size:42px;color:#fff;
  box-shadow:0 20px 40px -10px rgba(0,0,0,0.35);
  animation:splashPop 0.6s ease;
}
@keyframes splashPop{from{transform:scale(0.7);opacity:0;}to{transform:scale(1);opacity:1;}}
#splash .splash-title{font-family:'Poppins',sans-serif;font-weight:700;color:#fff;font-size:20px;letter-spacing:0.01em;}
#splash .splash-sub{font-family:'IBM Plex Mono',monospace;color:rgba(255,255,255,0.75);font-size:12px;letter-spacing:0.12em;text-transform:uppercase;}

/* ===== TOP BAR (display) ===== */
#topbar{
  position:absolute;top:0;left:0;right:0;height:9vh;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 4vw;z-index:5;
  background:linear-gradient(180deg, var(--bg-panel) 0%, transparent 100%);
}
#brandWrap{display:flex;align-items:center;gap:1.2vw;}
#logoCircle{
  width:5.2vh;height:5.2vh;border-radius:16px;
  background:linear-gradient(150deg, var(--accent), var(--accent-2));color:var(--on-accent);
  display:flex;align-items:center;justify-content:center;
  font-family:'Poppins',sans-serif;font-weight:700;font-size:2.4vh;flex-shrink:0;
  box-shadow:0 8px 18px -6px rgba(0,0,0,0.25);
}
#bizName{font-family:'Poppins',sans-serif;font-weight:600;font-size:2.6vh;letter-spacing:0.01em;}
#clock{font-size:2vh;color:var(--text-muted);letter-spacing:0.05em;}

/* ===== SLIDE STAGE ===== */
#stage{position:absolute;top:9vh;left:0;right:0;bottom:8vh;overflow:hidden;}
.slide{
  position:absolute;inset:0;display:flex;align-items:center;padding:0 6vw;
  opacity:0;transform:scale(1.04);transition:opacity 1s cubic-bezier(.4,0,.2,1), transform 1.4s cubic-bezier(.4,0,.2,1);
  pointer-events:none;
}
.slide.active{opacity:1;transform:scale(1);pointer-events:auto;}
.slide-eyebrow{
  font-family:'IBM Plex Mono',monospace;font-size:calc(1.6vh * var(--font-scale, 1));letter-spacing:0.16em;
  color:var(--accent);text-transform:uppercase;margin-bottom:1.4vh;display:inline-flex;align-items:center;gap:8px;
}
.slide-eyebrow::before{content:'';width:8px;height:8px;border-radius:50%;background:var(--accent);}
.slide-title{font-family:'Poppins',sans-serif;font-weight:700;font-size:calc(6.2vh * var(--font-scale, 1));line-height:1.1;margin:0 0 2vh 0;max-width:70vw;}
.slide-body{font-size:calc(2.5vh * var(--font-scale, 1));line-height:1.55;max-width:52vw;color:var(--text-muted);white-space:pre-line;}
.slide-content{max-width:56vw;position:relative;z-index:2;}
.slide-img{
  position:absolute;right:5vw;top:50%;transform:translateY(-50%);
  width:34vw;max-height:78vh;object-fit:cover;border-radius:24px;
  box-shadow:var(--shadow);border:1px solid var(--line);
}
.slide-img.full{position:absolute;inset:0;width:100%;height:100%;border-radius:0;object-fit:cover;border:none;}
.photo-overlay{position:absolute;inset:0;background:linear-gradient(180deg, rgba(0,0,0,0.05) 40%, rgba(0,0,0,0.82) 100%);z-index:1;}
.photo-caption{position:absolute;left:6vw;bottom:12vh;z-index:2;max-width:60vw;}

/* Ad / publicidade badge */
.ad-badge{
  position:absolute;top:2.5vh;right:5vw;z-index:3;
  background:rgba(0,0,0,0.35);border:1px solid rgba(255,255,255,0.35);color:#fff;
  font-family:'IBM Plex Mono',monospace;font-size:1.3vh;letter-spacing:0.14em;text-transform:uppercase;
  padding:0.7vh 1.4vh;border-radius:100px;backdrop-filter:blur(6px);
}
.ad-hint{
  position:absolute;bottom:2.5vh;right:5vw;z-index:3;
  font-size:1.4vh;color:rgba(255,255,255,0.85);font-family:'Inter',sans-serif;
}
.ad-hint a{color:#fff;font-weight:600;text-decoration:none;border-bottom:1px solid rgba(255,255,255,0.5);}

/* Telefone de contato animado */
#phoneBadge{
  position:absolute;right:4vw;bottom:calc(8vh + 2.4vh);z-index:6;
  display:none;align-items:center;gap:0.8vh;
  background:var(--accent);color:var(--on-accent);text-decoration:none;
  padding:1vh 1.8vh;border-radius:100px;font-family:'Poppins',sans-serif;font-weight:600;
  font-size:calc(2vh * var(--font-scale, 1));box-shadow:0 10px 24px -8px var(--accent);
  animation:phoneFloat 2.6s ease-in-out infinite;
}
#phoneBadge.show{display:flex;}
#phoneBadge svg{width:2vh;height:2vh;fill:currentColor;flex-shrink:0;}
@keyframes phoneFloat{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-6px);}
}

/* ---- Redes sociais ---- */
.social-list{display:flex;flex-direction:column;gap:1.6vh;margin-top:1vh;}
.social-row{display:flex;align-items:center;gap:1.4vh;font-size:calc(2.6vh * var(--font-scale,1));font-weight:600;}
.social-icon{
  width:4.4vh;height:4.4vh;border-radius:50%;background:var(--accent);color:var(--on-accent);
  display:flex;align-items:center;justify-content:center;font-size:2.2vh;flex-shrink:0;
}

/* ---- Avaliação Google ---- */
.stars{color:#F5A623;font-size:calc(4vh * var(--font-scale,1));letter-spacing:0.1em;margin-bottom:1vh;}
.review-quote{font-size:calc(2.8vh * var(--font-scale,1));line-height:1.5;font-style:italic;color:var(--text-primary);max-width:52vw;}

/* ---- Vídeo ---- */
.video-wrap{position:absolute;inset:0;background:#000;}
.video-wrap video, .video-wrap iframe{width:100%;height:100%;object-fit:cover;border:none;}
.video-caption{position:absolute;left:6vw;bottom:12vh;z-index:2;max-width:60vw;}
.video-caption .slide-title, .video-caption .slide-body{color:#fff;}

/* ---- Preço antigo/novo ---- */
.price-row{display:flex;align-items:baseline;gap:2vh;margin:1vh 0 1.6vh;}
.price-old{font-size:calc(3.4vh * var(--font-scale,1));color:var(--text-muted);text-decoration:line-through;font-family:'Poppins',sans-serif;}
.price-new{font-size:calc(6.5vh * var(--font-scale,1));color:var(--accent);font-weight:800;font-family:'Poppins',sans-serif;}

/* ---- QR code ---- */
.qr-wrap{display:flex;align-items:center;gap:3vw;}
.qr-box{background:#fff;padding:1.6vh;border-radius:20px;box-shadow:var(--shadow);flex-shrink:0;}
.qr-box img{display:block;width:18vh;height:18vh;}

/* ---- Logo da empresa ---- */
.logo-slide{width:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2vh;text-align:center;}
.logo-slide .big-logo-img{max-height:32vh;max-width:60vw;object-fit:contain;}
.logo-slide .big-logo-circle{
  width:18vh;height:18vh;border-radius:32px;background:linear-gradient(150deg,var(--accent),var(--accent-2));
  display:flex;align-items:center;justify-content:center;color:var(--on-accent);
  font-family:'Poppins',sans-serif;font-weight:800;font-size:8vh;box-shadow:var(--shadow);
}
.logo-slide .logo-slide-name{font-family:'Poppins',sans-serif;font-weight:700;font-size:calc(4vh * var(--font-scale,1));}

/* ---- Hora certa ---- */
.clock-slide{width:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1vh;text-align:center;}
.clock-slide .big-clock{font-family:'Poppins',sans-serif;font-weight:800;font-size:14vh;letter-spacing:0.02em;}
.clock-slide .big-date{font-family:'IBM Plex Mono',monospace;font-size:calc(2.4vh * var(--font-scale,1));color:var(--text-muted);text-transform:capitalize;letter-spacing:0.06em;}

/* ---- Você sabia? / curiosidade ---- */
.curio-icon{
  width:5vh;height:5vh;border-radius:50%;background:var(--accent);color:var(--on-accent);
  display:flex;align-items:center;justify-content:center;font-size:2.6vh;margin-bottom:1.4vh;
}

/* ---- Anuncie aqui (CTA institucional) ---- */
.ctaslide{
  position:absolute;inset:0;background:linear-gradient(150deg,var(--accent),var(--accent-2));
  display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:1.6vh;padding:0 8vw;
}
.ctaslide .slide-title, .ctaslide .slide-body{color:var(--on-accent);max-width:70vw;}
.ctaslide .cta-btn{
  margin-top:1vh;background:rgba(255,255,255,0.18);color:var(--on-accent);border:1px solid rgba(255,255,255,0.4);
  padding:1.4vh 3vh;border-radius:100px;font-family:'Poppins',sans-serif;font-weight:700;
  font-size:calc(2.2vh * var(--font-scale,1));text-decoration:none;
}

/* ---- Boas-vindas ---- */
.welcome-slide{width:100%;display:flex;flex-direction:column;align-items:flex-start;justify-content:center;}


.photo-caption .slide-title, .photo-caption .slide-body{color:#fff;}

.schedule-table{width:100%;max-width:60vw;border-collapse:collapse;margin-top:1vh;}
.schedule-table tr{border-bottom:1px solid var(--line);}
.schedule-table td{padding:1.3vh 0;font-size:calc(2.3vh * var(--font-scale, 1));}
.schedule-table td:first-child{color:var(--text-muted);font-family:'IBM Plex Mono',monospace;}
.schedule-table td:last-child{text-align:right;font-weight:600;font-family:'Poppins',sans-serif;}

/* ===== BOTTOM BAR ===== */
#bottombar{
  position:absolute;bottom:0;left:0;right:0;height:8vh;
  display:flex;align-items:center;justify-content:space-between;padding:0 4vw;
  background:var(--bg-panel);border-top:1px solid var(--line);z-index:5;
}
#liveWrap{display:flex;align-items:center;gap:1vw;}
#liveDot{width:1.1vh;height:1.1vh;border-radius:50%;background:var(--accent);animation:pulse 1.8s infinite;}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(76,141,246,0.5);}70%{box-shadow:0 0 0 1.4vh rgba(76,141,246,0);}100%{box-shadow:0 0 0 0 rgba(76,141,246,0);}}
#liveLabel{font-family:'IBM Plex Mono',monospace;font-size:1.5vh;letter-spacing:0.15em;color:var(--text-muted);}
#signalBars{display:flex;align-items:center;gap:0.5vh;}
.signal-seg{width:2.2vw;height:0.7vh;border-radius:4px;background:var(--line);overflow:hidden;position:relative;}
.signal-seg .fill{position:absolute;left:0;top:0;bottom:0;width:0%;background:var(--accent);transition:width 0.1s linear;border-radius:4px;}
.signal-seg.done .fill{width:100% !important;background:var(--accent-2);}
#brandFooter{display:flex;align-items:center;gap:0.9vw;font-family:'IBM Plex Mono',monospace;font-size:1.5vh;color:var(--text-muted);}
#brandFooter b{color:var(--text-primary);font-weight:500;}
#waLink{
  display:flex;align-items:center;gap:0.5vw;color:var(--text-primary);text-decoration:none;
  border:1px solid var(--line);padding:0.6vh 1.1vh;border-radius:100px;transition:transform 0.15s ease, background 0.2s ease;
}
#waLink:hover{transform:translateY(-1px);background:var(--bg-panel-2);}
#waLink svg{width:1.6vh;height:1.6vh;fill:#25D366;}

/* ===== GEAR BUTTON ===== */
#gearBtn{
  position:absolute;bottom:1.4vh;left:1vw;z-index:20;
  width:3.6vh;height:3.6vh;border-radius:50%;
  background:var(--bg-panel-2);border:1px solid var(--line);color:var(--text-muted);
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  opacity:0.35;transition:opacity 0.2s, transform 0.2s;
}
#gearBtn:hover{opacity:1;transform:rotate(25deg) scale(1.05);}
#gearBtn svg{width:1.8vh;height:1.8vh;fill:currentColor;}

/* ===== EDIT PANEL — glassmorphism / M3 ===== */
#editOverlay{
  position:fixed;inset:0;background:rgba(10,12,18,0.45);backdrop-filter:blur(6px);
  display:none;align-items:flex-start;justify-content:center;z-index:100;
  overflow-y:auto;padding:5vh 16px 40px;
}
#editOverlay.open{display:flex;}
#editPanel{
  width:min(720px, 94vw);
  background:var(--glass);backdrop-filter:blur(20px) saturate(160%);
  border:1px solid var(--glass-border);border-radius:28px;
  padding:26px 26px 28px;color:var(--text-primary);box-shadow:var(--shadow);
  animation:panelIn 0.35s cubic-bezier(.2,.8,.2,1);
}
@keyframes panelIn{from{opacity:0;transform:translateY(14px) scale(0.98);}to{opacity:1;transform:translateY(0) scale(1);}}
#editPanel h2{font-family:'Poppins',sans-serif;font-weight:700;font-size:21px;margin:0 0 4px;}
#editPanel .sub{color:var(--text-muted);font-size:13px;margin-bottom:20px;}

/* Theme picker */
.theme-block{background:var(--bg-panel-2);border-radius:20px;padding:16px;margin-bottom:18px;border:1px solid var(--line);}
.theme-block .label-row{font-size:12px;color:var(--text-muted);letter-spacing:0.03em;margin-bottom:10px;font-weight:600;text-transform:uppercase;}
.swatches{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px;}
.swatch{
  width:36px;height:36px;border-radius:50%;cursor:pointer;border:2px solid transparent;
  display:flex;align-items:center;justify-content:center;transition:transform 0.15s ease;
  box-shadow:0 4px 10px -4px rgba(0,0,0,0.3);
}
.swatch:hover{transform:scale(1.12);}
.swatch.active{border-color:var(--text-primary);}
.swatch svg{width:14px;height:14px;fill:#fff;opacity:0;}
.swatch.active svg{opacity:1;}
.segmented{display:flex;background:var(--bg-panel);border-radius:100px;padding:4px;gap:2px;border:1px solid var(--line);}
.segmented button{
  flex:1;border:none;background:transparent;padding:8px 10px;border-radius:100px;font-size:12.5px;font-weight:600;
  color:var(--text-muted);cursor:pointer;transition:all 0.2s ease;
}
.segmented button.active{background:var(--accent);color:var(--on-accent);}

.field-row{display:flex;gap:12px;margin-bottom:14px;flex-wrap:wrap;}
.field{flex:1;min-width:110px;display:flex;flex-direction:column;gap:6px;}
.field label{font-size:12px;color:var(--text-muted);letter-spacing:0.02em;font-weight:500;}
.field input, .field select, .field textarea{
  background:var(--bg-panel);border:1px solid var(--line);border-radius:14px;
  padding:10px 13px;color:var(--text-primary);font-size:14px;resize:vertical;width:100%;
}
.field input:focus, .field select:focus, .field textarea:focus{outline:2px solid var(--accent);outline-offset:0;}
hr.sep{border:none;border-top:1px solid var(--line);margin:20px 0;}
.slide-card{border:1px solid var(--line);border-radius:20px;padding:15px 16px;margin-bottom:12px;background:var(--bg-panel);}
.slide-card-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.slide-card-head span{font-size:12.5px;color:var(--text-muted);font-family:'IBM Plex Mono',monospace;}

.btn{
  border:none;border-radius:100px;padding:11px 20px;font-size:13.5px;font-weight:600;cursor:pointer;
  transition:transform 0.12s ease, box-shadow 0.2s ease, opacity 0.2s ease;
}
.btn:active{transform:scale(0.96);}
.btn-primary{background:var(--accent);color:var(--on-accent);box-shadow:0 8px 18px -8px var(--accent);}
.btn-ghost{background:var(--bg-panel-2);color:var(--text-primary);border:1px solid var(--line);}
.btn-danger{background:transparent;color:#E5484D;border:1px solid rgba(229,72,77,0.35);}
.btn-row{display:flex;gap:10px;margin-top:22px;justify-content:space-between;align-items:center;}
.btn-row .right{display:flex;gap:10px;}

#saveToast{
  position:fixed;bottom:24px;right:24px;background:var(--text-primary);color:var(--bg-base);
  padding:11px 18px;border-radius:100px;font-size:13px;opacity:0;transform:translateY(10px);
  transition:all 0.25s;z-index:200;box-shadow:var(--shadow);
}
#saveToast.show{opacity:1;transform:translateY(0);}
::-webkit-scrollbar{width:8px;}
::-webkit-scrollbar-thumb{background:var(--line);border-radius:4px;}

@media (max-width:480px){
  .field-row{flex-direction:column;}
  #editPanel{border-radius:22px;padding:20px 18px 22px;}
}
</style>
</head>

</div>

<div id="stage"></div>

let config = null;
let currentSlide = 0;
let rotationTimer = null;
let segmentTimer = null;
let segmentElapsedMs = 0;

// ---------- Storage ----------
async function loadConfig(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw) return JSON.parse(raw);
  }catch(e){ console.log('Sem configuração salva ainda.', e); }
  return JSON.parse(JSON.stringify(DEFAULT_CONFIG));
}
async function saveConfig(cfg){
  try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(cfg)); return true; }
  catch(e){ console.error(e); return false; }
}

// ---------- Theme ----------
function getThemeById(id){ return COLOR_THEMES.find(t=>t.id===id) || COLOR_THEMES[0]; }

function resolveMode(mode){
  if(mode === 'auto'){
    return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
  }
  return mode;
}

function applyTheme(){
  const theme = getThemeById(config.themeColor);
  document.documentElement.style.setProperty('--accent', theme.accent);
  document.documentElement.style.setProperty('--accent-2', theme.accent2);
  document.documentElement.style.setProperty('--font-scale', config.fontScale || 1);
  document.documentElement.setAttribute('data-mode', resolveMode(config.themeMode));
  document.getElementById('themeColorMeta').setAttribute('content', theme.accent);
}

window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', ()=>{
  if(config && config.themeMode === 'auto') applyTheme();
});

// ---------- Rendering ----------
function applyBrand(){
  document.getElementById('bizName').textContent = config.bizName;
  document.getElementById('logoCircle').textContent = (config.logoLetter || config.bizName[0] || 'A').toUpperCase();

  const phoneBadge = document.getElementById('phoneBadge');
  const digits = (config.contactPhone || '').replace(/\D/g,'');
  if(digits.length >= 8){
    phoneBadge.classList.add('show');
    phoneBadge.href = 'tel:' + digits;
    document.getElementById('phoneBadgeText').textContent = config.contactPhone;
  }else{
    phoneBadge.classList.remove('show');
  }
}

function escapeHTML(str){
  return String(str||'').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}
function escapeAttr(str){ return escapeHTML(str); }

function starsHTML(n){
  const full = Math.max(0, Math.min(5, parseInt(n)||5));
  return '★'.repeat(full) + '☆'.repeat(5-full);
}

const SOCIAL_ICONS = { instagram:'📷', facebook:'📘', tiktok:'🎵', whatsapp:'💬', youtube:'▶️', google:'🔍', linkedin:'💼' };

function slideHTML(slide){
  const eyebrow = slide.eyebrow ? `<span class="slide-eyebrow">${escapeHTML(slide.eyebrow)}</span>` : '';
  const hasImg = slide.imageUrl && slide.imageUrl.trim().length > 0;
  const useBg = !!slide.useBgImage && hasImg;
  const qrData = (url)=> `https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${encodeURIComponent(url||'')}`;

  const adBadge = slide.type === 'anuncio'
    ? `<div class="ad-badge">Publicidade</div><div class="ad-hint">Quer anunciar aqui? <a href="https://wa.me/5511951394342" target="_blank" rel="noopener">Fale com a Anca Soluções</a></div>`
    : '';

  switch(slide.type){

    case 'horario': {
      const rows = (slide.body||'').split('\n').filter(l=>l.trim()).map(l=>{
        const parts = l.split(':'); const day = parts.shift(); const rest = parts.join(':').trim();
        return `<tr><td>${escapeHTML((day||'').trim())}</td><td>${escapeHTML(rest)}</td></tr>`;
      }).join('');
      return `<div class="slide-content">${eyebrow}
        <div class="slide-title display-face">${escapeHTML(slide.title||'')}</div>
        <table class="schedule-table mono">${rows}</table></div>`;
    }

    case 'redes': {
      const rows = (slide.body||'').split('\n').filter(l=>l.trim()).map(l=>{
        const parts = l.split(':'); const platform = (parts.shift()||'').trim(); const handle = parts.join(':').trim();
        const key = platform.toLowerCase().replace(/[^a-z]/g,'');
        const icon = SOCIAL_ICONS[key] || '🔗';
        return `<div class="social-row"><div class="social-icon">${icon}</div><span>${escapeHTML(handle)}</span></div>`;
      }).join('');
      return `<div class="slide-content">${eyebrow}
        <div class="slide-title display-face">${escapeHTML(slide.title||'Nos siga')}</div>
        <div class="social-list">${rows}</div></div>`;
    }

    case 'avaliacao': {
      const qr = slide.linkUrl ? `<div class="qr-box"><img src="${qrData(slide.linkUrl)}" /></div>` : '';
      return `<div class="slide-content">${eyebrow}
        <div class="stars">${starsHTML(slide.rating)}</div>
        <div class="slide-title display-face">${escapeHTML(slide.title||'Avalie nosso atendimento')}</div>
        <div class="review-quote">${escapeHTML(slide.body||'')}</div></div>
        ${qr ? `<div class="qr-wrap" style="position:absolute;right:5vw;top:50%;transform:translateY(-50%);">${qr}</div>` : ''}`;
    }

    case 'video': {
      const url = slide.videoUrl || '';
      const yt = url.match(/(?:youtube\.com.*(?:\?v=|\/embed\/)|youtu\.be\/)([\w-]{6,})/);
      const inner = yt
        ? `<iframe src="https://www.youtube.com/embed/${yt[1]}?autoplay=1&mute=1&loop=1&playlist=${yt[1]}&controls=0" allow="autoplay"></iframe>`
        : (url ? `<video src="${escapeAttr(url)}" autoplay muted loop playsinline></video>` : '');
      return `<div class="video-wrap">${inner}</div>
        ${(slide.title||slide.body) ? `<div class="video-caption">${eyebrow}
          <div class="slide-title display-face">${escapeHTML(slide.title||'')}</div>
          <div class="slide-body">${escapeHTML(slide.body||'')}</div></div>` : ''}`;
    }

    case 'foto_tela': {
      return `${hasImg ? `<img class="slide-img full" src="${escapeAttr(slide.imageUrl)}" onerror="this.style.display='none'" />` : ''}
        ${(slide.title||slide.body) ? `<div class="photo-overlay"></div>
        <div class="photo-caption">${eyebrow}
          <div class="slide-title display-face">${escapeHTML(slide.title||'')}</div>
          <div class="slide-body">${escapeHTML(slide.body||'')}</div></div>` : ''}`;
    }

    case 'preco': {
      return `<div class="slide-content">${eyebrow}
        <div class="slide-title display-face">${escapeHTML(slide.title||'')}</div>
        <div class="price-row">
          ${slide.oldPrice ? `<span class="price-old">${escapeHTML(slide.oldPrice)}</span>` : ''}
          <span class="price-new">${escapeHTML(slide.newPrice||'')}</span>
        </div>
        <div class="slide-body">${escapeHTML(slide.body||'')}</div></div>
        ${hasImg ? `<img class="slide-img" src="${escapeAttr(slide.imageUrl)}" onerror="this.style.display='none'" />` : ''}`;
    }

    case 'qrcode': {
      return `<div class="slide-content">
        <div class="qr-wrap">
          <div class="qr-box"><img src="${qrData(slide.linkUrl)}" /></div>
          <div>${eyebrow}
            <div class="slide-title display-face">${escapeHTML(slide.title||'Aponte a câmera')}</div>
            <div class="slide-body">${escapeHTML(slide.body||'')}</div>
          </div>
        </div></div>`;
    }

    case 'logo': {
      return `<div class="logo-slide">
        ${hasImg
          ? `<img class="big-logo-img" src="${escapeAttr(slide.imageUrl)}" onerror="this.style.display='none'" />`
          : `<div class="big-logo-circle">${escapeHTML((config.logoLetter||'A').toUpperCase())}</div>`}
        <div class="logo-slide-name display-face">${escapeHTML(slide.title || config.bizName || '')}</div>
        ${slide.body ? `<div class="slide-body">${escapeHTML(slide.body)}</div>` : ''}
      </div>`;
    }

    case 'hora': {
      const now = new Date();
      const hh = String(now.getHours()).padStart(2,'0'), mm = String(now.getMinutes()).padStart(2,'0');
      const dateStr = now.toLocaleDateString('pt-BR', { weekday:'long', day:'numeric', month:'long' });
      return `<div class="clock-slide">
        ${eyebrow}
        <div class="big-clock mono" data-live-clock>${hh}:${mm}</div>
        <div class="big-date" data-live-date>${escapeHTML(dateStr)}</div>
      </div>`;
    }

    case 'curiosidade': {
      return `<div class="slide-content">
        <div class="curio-icon">💡</div>
        ${eyebrow || '<span class="slide-eyebrow">Você sabia?</span>'}
        <div class="slide-title display-face">${escapeHTML(slide.title||'')}</div>
        <div class="slide-body">${escapeHTML(slide.body||'')}</div></div>
        ${hasImg ? `<img class="slide-img" src="${escapeAttr(slide.imageUrl)}" onerror="this.style.display='none'" />` : ''}`;
    }

    case 'anuncie_aqui': {
      return `<div class="ctaslide">
        <div class="slide-eyebrow" style="color:#fff;">Espaço disponível</div>
        <div class="slide-title display-face">${escapeHTML(slide.title||'Anuncie aqui!')}</div>
        <div class="slide-body">${escapeHTML(slide.body||'Alcance os clientes deste estabelecimento todos os dias.')}</div>
        <a class="cta-btn" href="https://wa.me/5511951394342" target="_blank" rel="noopener">Fale com a Anca Soluções</a>
      </div>`;
    }

    case 'depoimento': {
      return `<div class="slide-content">${eyebrow || '<span class="slide-eyebrow">Depoimento</span>'}
        <div class="review-quote">"${escapeHTML(slide.body||'')}"</div>
        <div class="slide-title display-face" style="font-size:calc(3vh * var(--font-scale,1));margin-top:1.6vh;">— ${escapeHTML(slide.title||'')}</div></div>
        ${hasImg ? `<img class="slide-img" src="${escapeAttr(slide.imageUrl)}" onerror="this.style.display='none'" />` : ''}`;
    }

    case 'boasvindas': {
      const now = new Date();
      const h = now.getHours();
      const saudacao = h < 12 ? 'Bom dia' : (h < 18 ? 'Boa tarde' : 'Boa noite');
      return `<div class="welcome-slide">${eyebrow}
        <div class="slide-title display-face">${escapeHTML(saudacao)}${slide.title ? ', ' + escapeHTML(slide.title) : ''}!</div>
        <div class="slide-body">${escapeHTML(slide.body||'Seja bem-vindo(a).')}</div></div>`;
    }

    default: { // promo, dica, foto, anuncio
      if(slide.type === 'foto' || useBg){
        return `${hasImg ? `<img class="slide-img full" src="${escapeAttr(slide.imageUrl)}" onerror="this.style.display='none'" />` : ''}
          <div class="photo-overlay"></div>
          <div class="photo-caption">${eyebrow}
            <div class="slide-title display-face">${escapeHTML(slide.title||'')}</div>
            <div class="slide-body">${escapeHTML(slide.body||'')}</div>
          </div>
          ${adBadge}`;
      }
      return `<div class="slide-content">${eyebrow}
          <div class="slide-title display-face">${escapeHTML(slide.title||'')}</div>
          <div class="slide-body">${escapeHTML(slide.body||'')}</div></div>
          ${hasImg ? `<img class="slide-img" src="${escapeAttr(slide.imageUrl)}" onerror="this.style.display='none'" />` : ''}
          ${adBadge}`;
    }
  }
}

function renderStage(){
  const stage = document.getElementById('stage');
  stage.innerHTML = '';
  config.slides.forEach((s,i)=>{
    const div = document.createElement('div');
    div.className = 'slide' + (i===0?' active':'');
    div.innerHTML = slideHTML(s);
    stage.appendChild(div);
  });
}
function renderSignalBars(){
  const wrap = document.getElementById('signalBars');
  wrap.innerHTML = '';
  config.slides.forEach(()=>{
    const seg = document.createElement('div');
    seg.className = 'signal-seg';
    seg.innerHTML = '<div class="fill"></div>';
    wrap.appendChild(seg);
  });
}
function goToSlide(index){
  document.querySelectorAll('.slide').forEach(s=>s.classList.remove('active'));
  const slides = document.querySelectorAll('.slide');
  if(slides[index]) slides[index].classList.add('active');
  currentSlide = index;
  document.querySelectorAll('.signal-seg').forEach((seg,i)=>{
    seg.classList.toggle('done', i < index);
    const fill = seg.querySelector('.fill');
    if(i < index) fill.style.width = '100%';
    else if(i > index) fill.style.width = '0%';
  });
  segmentElapsedMs = 0;
}
function startRotation(){
  clearInterval(rotationTimer); clearInterval(segmentTimer);
  if(config.slides.length <= 1) return;
  const totalMs = Math.max(4, config.intervalSeconds || 8) * 1000;
  segmentElapsedMs = 0;
  segmentTimer = setInterval(()=>{
    segmentElapsedMs += 100;
    const pct = Math.min(100, (segmentElapsedMs/totalMs)*100);
    const segs = document.querySelectorAll('.signal-seg');
    if(segs[currentSlide]) segs[currentSlide].querySelector('.fill').style.width = pct+'%';
  }, 100);
  rotationTimer = setInterval(()=> goToSlide((currentSlide+1) % config.slides.length), totalMs);
}
function tickClock(){
  const now = new Date();
  document.getElementById('clock').textContent =
    String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');

  const liveClock = document.querySelector('[data-live-clock]');
  if(liveClock){
    liveClock.textContent = String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
    const liveDate = document.querySelector('[data-live-date]');
    if(liveDate) liveDate.textContent = now.toLocaleDateString('pt-BR', { weekday:'long', day:'numeric', month:'long' });
  }
}

// ---------- Theme picker UI ----------
function renderColorSwatches(){
  const wrap = document.getElementById('colorSwatches');
  wrap.innerHTML = '';
  COLOR_THEMES.forEach(t=>{
    const el = document.createElement('div');
    el.className = 'swatch' + (config.themeColor === t.id ? ' active' : '');
    el.style.background = `linear-gradient(150deg, ${t.accent}, ${t.accent2})`;
    el.title = t.name;
    el.innerHTML = '<svg viewBox="0 0 24 24"><path d="M9 16.2 4.8 12l-1.4 1.4L9 19 20.6 7.4l-1.4-1.4z"/></svg>';
    el.addEventListener('click', ()=>{
      config.themeColor = t.id;
      applyTheme();
      renderColorSwatches();
    });
    wrap.appendChild(el);
  });
}
function renderModeSegmented(){
  document.querySelectorAll('#modeSegmented button').forEach(btn=>{
    btn.classList.toggle('active', btn.dataset.mode === config.themeMode);
    btn.onclick = ()=>{
      config.themeMode = btn.dataset.mode;
      applyTheme();
      renderModeSegmented();
    };
  });
}
function renderFontSegmented(){
  document.querySelectorAll('#fontSegmented button').forEach(btn=>{
    btn.classList.toggle('active', parseFloat(btn.dataset.scale) === (config.fontScale || 1));
    btn.onclick = ()=>{
      config.fontScale = parseFloat(btn.dataset.scale);
      applyTheme();
      renderFontSegmented();
    };
  });
}

// ---------- Edit panel ----------
function openEditPanel(){
  document.getElementById('f-bizName').value = config.bizName;
  document.getElementById('f-logoLetter').value = config.logoLetter;
  document.getElementById('f-interval').value = config.intervalSeconds;
  document.getElementById('f-phone').value = config.contactPhone || '';
  renderColorSwatches();
  renderModeSegmented();
  renderFontSegmented();
  renderSlidesList();
  document.getElementById('editOverlay').classList.add('open');
}
function closeEditPanel(){ document.getElementById('editOverlay').classList.remove('open'); }

const TYPE_META = {
  promo:        { label:'Promoção',                bodyLabel:'Texto', hasImage:true },
  dica:         { label:'Dica',                     bodyLabel:'Texto', hasImage:true },
  foto:         { label:'Foto (com legenda)',       bodyLabel:'Texto (opcional)', hasImage:true },
  foto_tela:    { label:'Fotos tela inteira',       bodyLabel:'Texto (opcional)', hasImage:true },
  horario:      { label:'Horário',                  bodyLabel:'Linhas (Dia: Horário, uma por linha)', hasImage:false },
  redes:        { label:'Redes sociais',            bodyLabel:'Linhas (Plataforma: @usuario, uma por linha)', hasImage:false },
  avaliacao:    { label:'Avaliação Google (★)',     bodyLabel:'Depoimento / citação', hasImage:false, extra:['rating','linkUrl'] },
  video:        { label:'Vídeo',                    bodyLabel:'Legenda (opcional)', hasImage:false, extra:['videoUrl'] },
  preco:        { label:'Preço antigo e novo',      bodyLabel:'Descrição', hasImage:true, extra:['oldPrice','newPrice'] },
  qrcode:       { label:'QR Code',                  bodyLabel:'Texto de apoio', hasImage:false, extra:['linkUrl'] },
  logo:         { label:'Logo da empresa',          bodyLabel:'Texto (opcional)', hasImage:true },
  hora:         { label:'Hora certa',                bodyLabel:null, hasImage:false },
  curiosidade:  { label:'Você sabia?',               bodyLabel:'Texto', hasImage:true },
  anuncio:      { label:'Publicidade (outro cliente)', bodyLabel:'Texto', hasImage:true },
  anuncie_aqui: { label:'Anuncie aqui!!',            bodyLabel:'Texto', hasImage:false },
  depoimento:   { label:'Depoimento de cliente',     bodyLabel:'Citação', hasImage:true, titleLabel:'Nome do cliente' },
  boasvindas:   { label:'Boas-vindas',               bodyLabel:'Mensagem', hasImage:false, titleLabel:'Nome (opcional)' }
};
const TYPE_GROUPS = [
  { label:'Conteúdo', types:['promo','dica','foto','foto_tela','curiosidade'] },
  { label:'Institucional', types:['horario','redes','logo','hora','boasvindas'] },
  { label:'Prova social', types:['avaliacao','depoimento'] },
  { label:'Vendas', types:['preco','video','qrcode'] },
  { label:'Publicidade', types:['anuncio','anuncie_aqui'] }
];

function renderSlidesList(){
  const list = document.getElementById('slidesList');
  list.innerHTML = '';
  config.slides.forEach((slide, idx)=>{
    const meta = TYPE_META[slide.type] || TYPE_META.promo;
    const card = document.createElement('div');
    card.className = 'slide-card';

    const optionsHTML = TYPE_GROUPS.map(g=>
      `<optgroup label="${g.label}">` +
      g.types.map(t=>`<option value="${t}" ${slide.type===t?'selected':''}>${TYPE_META[t].label}</option>`).join('') +
      `</optgroup>`
    ).join('');

    let extraFieldsHTML = '';
    if(meta.extra && meta.extra.includes('rating')){
      extraFieldsHTML += `<div class="field" style="max-width:150px;"><label>Nota (estrelas)</label>
        <select data-field="rating" data-idx="${idx}">
          ${[5,4,3,2,1].map(n=>`<option value="${n}" ${(slide.rating||5)==n?'selected':''}>${n} ★</option>`).join('')}
        </select></div>`;
    }
    if(meta.extra && meta.extra.includes('linkUrl')){
      extraFieldsHTML += `<div class="field"><label>Link (site, review, WhatsApp…)</label>
        <input data-field="linkUrl" data-idx="${idx}" type="text" placeholder="https://..." value="${escapeAttr(slide.linkUrl||'')}" /></div>`;
    }
    if(meta.extra && meta.extra.includes('videoUrl')){
      extraFieldsHTML += `<div class="field"><label>Link do vídeo (YouTube ou .mp4)</label>
        <input data-field="videoUrl" data-idx="${idx}" type="text" placeholder="https://..." value="${escapeAttr(slide.videoUrl||'')}" /></div>`;
    }
    if(meta.extra && meta.extra.includes('oldPrice')){
      extraFieldsHTML += `<div class="field" style="max-width:140px;"><label>Preço antigo</label>
        <input data-field="oldPrice" data-idx="${idx}" type="text" placeholder="R$ 150" value="${escapeAttr(slide.oldPrice||'')}" /></div>
        <div class="field" style="max-width:140px;"><label>Preço novo</label>
        <input data-field="newPrice" data-idx="${idx}" type="text" placeholder="R$ 99" value="${escapeAttr(slide.newPrice||'')}" /></div>`;
    }

    card.innerHTML = `
      <div class="slide-card-head">
        <span>SLIDE ${idx+1} · ${meta.label}</span>
        <button class="btn btn-danger" data-remove="${idx}" type="button" style="padding:6px 12px;">Remover</button>
      </div>
      <div class="field-row">
        <div class="field" style="max-width:190px;">
          <label>Tipo</label>
          <select data-field="type" data-idx="${idx}" data-retype="${idx}">${optionsHTML}</select>
        </div>
        <div class="field">
          <label>Etiqueta</label>
          <input data-field="eyebrow" data-idx="${idx}" type="text" value="${escapeAttr(slide.eyebrow||'')}" />
        </div>
      </div>
      <div class="field" style="margin-bottom:14px;">
        <label>${meta.titleLabel || 'Título'}</label>
        <input data-field="title" data-idx="${idx}" type="text" value="${escapeAttr(slide.title||'')}" />
      </div>
      ${extraFieldsHTML ? `<div class="field-row">${extraFieldsHTML}</div>` : ''}
      ${meta.bodyLabel ? `<div class="field" style="margin-bottom:14px;">
        <label>${meta.bodyLabel}</label>
        <textarea data-field="body" data-idx="${idx}" rows="${slide.type==='horario'||slide.type==='redes'?4:3}">${escapeHTML(slide.body||'')}</textarea>
      </div>` : ''}
      ${meta.hasImage ? `<div class="field">
        <label>Imagem</label>
        <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;">
          <label class="btn btn-ghost" style="cursor:pointer;">📷 Enviar do computador
            <input type="file" accept="image/*" data-imgfile="${idx}" style="display:none;" />
          </label>
          <input data-field="imageUrl" data-idx="${idx}" type="text" placeholder="ou cole um link (URL)" value="${slide.imageUrl && slide.imageUrl.startsWith('http') ? escapeAttr(slide.imageUrl) : ''}" style="flex:1;min-width:140px;" />
        </div>
        ${slide.imageUrl ? `<img src="${escapeAttr(slide.imageUrl)}" style="max-width:100%;max-height:80px;border-radius:10px;margin-top:8px;border:1px solid var(--line);" />` : ''}
        ${slide.type!=='foto_tela' && slide.type!=='logo' ? `<label style="display:flex;align-items:center;gap:8px;margin-top:10px;font-size:13px;color:var(--text-muted);cursor:pointer;">
          <input type="checkbox" data-checkbox="useBgImage" data-idx="${idx}" ${slide.useBgImage ? 'checked' : ''} />
          Usar essa imagem como fundo do slide (tela toda)
        </label>` : ''}
      </div>` : ''}
    `;
    list.appendChild(card);
  });

  list.querySelectorAll('[data-retype]').forEach(sel=>{
    sel.addEventListener('change', (e)=>{
      const idx = parseInt(e.target.dataset.idx);
      config.slides[idx].type = e.target.value;
      renderSlidesList();
    });
  });

  list.querySelectorAll('[data-checkbox]').forEach(input=>{
    input.addEventListener('change', (e)=>{
      const idx = parseInt(e.target.dataset.idx);
      config.slides[idx][e.target.dataset.checkbox] = e.target.checked;
    });
  });

  list.querySelectorAll('[data-imgfile]').forEach(input=>{
    input.addEventListener('change', (e)=>{
      const idx = parseInt(e.target.dataset.imgfile);
      const file = e.target.files[0];
      if(!file) return;
      if(file.size > 900*1024){
        alert('Essa imagem é grande demais (máx. recomendado ~900KB). Tente uma foto mais leve, ou use um link (URL).');
        return;
      }
      const reader = new FileReader();
      reader.onload = ()=>{ config.slides[idx].imageUrl = reader.result; renderSlidesList(); };
      reader.readAsDataURL(file);
    });
  });
  list.querySelectorAll('[data-field]').forEach(input=>{
    input.addEventListener('input', (e)=>{
      const idx = parseInt(e.target.dataset.idx);
      config.slides[idx][e.target.dataset.field] = e.target.value;
    });
  });
  list.querySelectorAll('[data-remove]').forEach(btn=>{
    btn.addEventListener('click', (e)=>{
      config.slides.splice(parseInt(e.target.dataset.remove),1);
      renderSlidesList();
    });
  });
}

function addSlide(){
  config.slides.push({ type:'promo', eyebrow:'', title:'Novo slide', body:'', imageUrl:'' });
  renderSlidesList();
}

function loadTemplate(){
  const key = document.getElementById('f-template').value;
  if(!key || !TEMPLATES[key]) return;
  if(!confirm('Isso vai substituir os slides atuais pelo modelo escolhido. Continuar?')) return;
  const tpl = TEMPLATES[key];
  config.bizName = tpl.bizName;
  config.logoLetter = tpl.logoLetter;
  config.themeColor = tpl.themeColor;
  config.slides = JSON.parse(JSON.stringify(tpl.slides));
  document.getElementById('f-bizName').value = config.bizName;
  document.getElementById('f-logoLetter').value = config.logoLetter;
  applyTheme();
  renderColorSwatches();
  renderSlidesList();
}

function showToast(msg){
  const toast = document.getElementById('saveToast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(()=> toast.classList.remove('show'), 2200);
}

async function handleSave(){
  config.bizName = document.getElementById('f-bizName').value.trim() || 'Meu negócio';
  config.contactPhone = document.getElementById('f-phone').value.trim();
  config.logoLetter = document.getElementById('f-logoLetter').value.trim() || config.bizName[0];
  config.intervalSeconds = parseInt(document.getElementById('f-interval').value) || 8;
  if(config.slides.length === 0){
    config.slides.push({type:'promo', eyebrow:'', title:'Adicione seu primeiro slide', body:'', imageUrl:''});
  }
  const ok = await saveConfig(config);
  applyBrand();
  applyTheme();
  renderStage();
  renderSignalBars();
  goToSlide(0);
  startRotation();
  showToast(ok ? 'Salvo com sucesso.' : 'Não foi possível salvar — tente novamente.');
  closeEditPanel();
}

// ---------- PWA ----------
if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  });
}

// ---------- Init ----------
async function init(){
  config = await loadConfig();
  applyBrand();
  applyTheme();
  renderStage();
  renderSignalBars();
  goToSlide(0);
  startRotation();
  tickClock();
  setInterval(tickClock, 15000);

  document.getElementById('gearBtn').addEventListener('click', openEditPanel);
  document.getElementById('closeEditBtn').addEventListener('click', closeEditPanel);
  document.getElementById('saveBtn').addEventListener('click', handleSave);
  document.getElementById('addSlideBtn').addEventListener('click', addSlide);
  document.getElementById('loadTemplateBtn').addEventListener('click', loadTemplate);

  setTimeout(()=> document.getElementById('splash').classList.add('hide'), 900);
}

init();
</script>
</body>
</html>
