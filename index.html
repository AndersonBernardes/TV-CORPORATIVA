<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TV Corporativa — Anca Soluções</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap');

:root{
  --bg-base:#10161A;
  --bg-panel:#1A2226;
  --bg-panel-2:#212B30;
  --text-primary:#F5F1E8;
  --text-muted:#7C8891;
  --accent: #E8A33D;
  --accent-teal:#2F6E62;
  --line: rgba(245,241,232,0.08);
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;height:100%;background:var(--bg-base);overflow:hidden;}
body{
  font-family:'Inter',sans-serif;
  color:var(--text-primary);
  width:100vw;height:100vh;
  position:relative;
}
.mono{font-family:'IBM Plex Mono',monospace;}
.display-face{font-family:'Space Grotesk',sans-serif;}

/* ---------- TOP BAR ---------- */
#topbar{
  position:absolute;top:0;left:0;right:0;height:9vh;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 4vw;
  background:linear-gradient(180deg, var(--bg-panel) 0%, rgba(26,34,38,0) 100%);
  z-index:5;
}
#brandWrap{display:flex;align-items:center;gap:1.2vw;}
#logoCircle{
  width:5.2vh;height:5.2vh;border-radius:50%;
  background:var(--accent);color:#10161A;
  display:flex;align-items:center;justify-content:center;
  font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:2.4vh;
  flex-shrink:0;
}
#bizName{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:2.6vh;letter-spacing:0.01em;}
#clock{font-size:2vh;color:var(--text-muted);letter-spacing:0.05em;}

/* ---------- SLIDE STAGE ---------- */
#stage{
  position:absolute;top:9vh;left:0;right:0;bottom:8vh;
  overflow:hidden;
}
.slide{
  position:absolute;inset:0;
  display:flex;align-items:center;
  padding:0 6vw;
  opacity:0;transform:scale(1.03);
  transition:opacity 0.9s ease, transform 1.4s ease;
  pointer-events:none;
}
.slide.active{opacity:1;transform:scale(1);pointer-events:auto;}

.slide-eyebrow{
  font-family:'IBM Plex Mono',monospace;font-size:1.6vh;letter-spacing:0.18em;
  color:var(--accent);text-transform:uppercase;margin-bottom:1.4vh;display:block;
}
.slide-title{
  font-family:'Space Grotesk',sans-serif;font-weight:700;
  font-size:6.5vh;line-height:1.08;margin:0 0 2vh 0;max-width:70vw;
}
.slide-body{
  font-size:2.6vh;line-height:1.5;color:var(--text-primary);max-width:52vw;
  font-weight:400;
}
.slide-content{max-width:56vw;position:relative;z-index:2;}
.slide-img{
  position:absolute;right:5vw;top:50%;transform:translateY(-50%);
  width:34vw;max-height:78vh;object-fit:cover;border-radius:18px;
  box-shadow:0 30px 60px -20px rgba(0,0,0,0.6);
  border:1px solid var(--line);
}
.slide-img.full{
  position:absolute;inset:0;width:100%;height:100%;border-radius:0;
  object-fit:cover;border:none;
}
.photo-overlay{
  position:absolute;inset:0;
  background:linear-gradient(180deg, rgba(16,22,26,0.05) 40%, rgba(16,22,26,0.88) 100%);
  z-index:1;
}
.photo-caption{position:absolute;left:6vw;bottom:12vh;z-index:2;max-width:60vw;}

/* schedule table (horario) */
.schedule-table{width:100%;max-width:60vw;border-collapse:collapse;margin-top:1vh;}
.schedule-table tr{border-bottom:1px solid var(--line);}
.schedule-table td{padding:1.4vh 0;font-size:2.4vh;}
.schedule-table td:first-child{color:var(--text-muted);font-family:'IBM Plex Mono',monospace;letter-spacing:0.03em;}
.schedule-table td:last-child{text-align:right;font-weight:600;font-family:'Space Grotesk',sans-serif;}

/* ---------- BOTTOM BAR ---------- */
#bottombar{
  position:absolute;bottom:0;left:0;right:0;height:8vh;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 4vw;
  background:var(--bg-panel);
  border-top:1px solid var(--line);
  z-index:5;
}
#liveWrap{display:flex;align-items:center;gap:1vw;}
#liveDot{
  width:1.1vh;height:1.1vh;border-radius:50%;background:var(--accent);
  animation:pulse 1.8s infinite;
}
@keyframes pulse{
  0%{box-shadow:0 0 0 0 rgba(232,163,61,0.55);}
  70%{box-shadow:0 0 0 1.4vh rgba(232,163,61,0);}
  100%{box-shadow:0 0 0 0 rgba(232,163,61,0);}
}
#liveLabel{font-family:'IBM Plex Mono',monospace;font-size:1.5vh;letter-spacing:0.15em;color:var(--text-muted);}

#signalBars{display:flex;align-items:center;gap:0.5vh;}
.signal-seg{
  width:2.2vw;height:0.7vh;border-radius:2px;background:var(--line);overflow:hidden;position:relative;
}
.signal-seg .fill{
  position:absolute;left:0;top:0;bottom:0;width:0%;background:var(--accent);
  transition:width 0.1s linear;
}
.signal-seg.done .fill{width:100% !important;background:var(--accent-teal);}

#brandFooter{
  display:flex;align-items:center;gap:0.9vw;
  font-family:'IBM Plex Mono',monospace;font-size:1.5vh;color:var(--text-muted);
  letter-spacing:0.02em;
}
#brandFooter b{color:var(--text-primary);font-weight:500;}
#waLink{
  display:flex;align-items:center;gap:0.5vw;color:var(--text-primary);text-decoration:none;
  border:1px solid var(--line);padding:0.6vh 1.1vh;border-radius:100px;
}
#waLink svg{width:1.6vh;height:1.6vh;fill:#25D366;}

/* ---------- GEAR / EDIT TOGGLE ---------- */
#gearBtn{
  position:absolute;bottom:1.2vh;left:1vw;z-index:20;
  width:3.4vh;height:3.4vh;border-radius:50%;
  background:rgba(255,255,255,0.06);border:1px solid var(--line);
  color:var(--text-muted);display:flex;align-items:center;justify-content:center;
  cursor:pointer;opacity:0.35;transition:opacity 0.2s;
}
#gearBtn:hover{opacity:1;}
#gearBtn svg{width:1.8vh;height:1.8vh;fill:currentColor;}

/* ---------- EDIT PANEL ---------- */
#editOverlay{
  position:fixed;inset:0;background:rgba(8,10,12,0.72);backdrop-filter:blur(3px);
  display:none;align-items:center;justify-content:center;z-index:100;
  font-family:'Inter',sans-serif;
}
#editOverlay.open{display:flex;}
#editPanel{
  width:min(720px, 92vw);max-height:88vh;overflow-y:auto;
  background:var(--bg-panel-2);border:1px solid var(--line);border-radius:16px;
  padding:28px 30px 30px;color:var(--text-primary);
}
#editPanel h2{font-family:'Space Grotesk',sans-serif;font-size:20px;margin:0 0 4px;}
#editPanel .sub{color:var(--text-muted);font-size:13px;margin-bottom:22px;}
.field-row{display:flex;gap:12px;margin-bottom:14px;}
.field{flex:1;display:flex;flex-direction:column;gap:6px;}
.field label{font-size:12px;color:var(--text-muted);letter-spacing:0.03em;}
.field input, .field select, .field textarea{
  background:var(--bg-base);border:1px solid var(--line);border-radius:8px;
  padding:9px 11px;color:var(--text-primary);font-family:'Inter',sans-serif;font-size:14px;
  resize:vertical;
}
.field input:focus, .field select:focus, .field textarea:focus{outline:2px solid var(--accent);outline-offset:0;}
hr.sep{border:none;border-top:1px solid var(--line);margin:20px 0;}
.slide-card{
  border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin-bottom:12px;background:rgba(255,255,255,0.02);
}
.slide-card-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.slide-card-head span{font-size:13px;color:var(--text-muted);font-family:'IBM Plex Mono',monospace;}
.btn{
  border:none;border-radius:8px;padding:9px 16px;font-size:13px;font-weight:600;cursor:pointer;
  font-family:'Inter',sans-serif;
}
.btn-primary{background:var(--accent);color:#10161A;}
.btn-ghost{background:transparent;color:var(--text-muted);border:1px solid var(--line);}
.btn-danger{background:transparent;color:#E36A5C;border:1px solid rgba(227,106,92,0.3);}
.btn-row{display:flex;gap:10px;margin-top:22px;justify-content:space-between;align-items:center;}
.btn-row .right{display:flex;gap:10px;}
#saveToast{
  position:fixed;bottom:24px;right:24px;background:var(--accent-teal);color:#F5F1E8;
  padding:10px 18px;border-radius:8px;font-size:13px;opacity:0;transform:translateY(8px);
  transition:all 0.25s;z-index:200;font-family:'Inter',sans-serif;
}
#saveToast.show{opacity:1;transform:translateY(0);}
::-webkit-scrollbar{width:8px;}
::-webkit-scrollbar-thumb{background:var(--line);border-radius:4px;}
</style>
</head>

// ---------- Storage (fica guardado no próprio aparelho/navegador) ----------
async function loadConfig(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw) return JSON.parse(raw);
  }catch(e){
    console.log('Nenhuma configuração salva ainda, usando padrão.', e);
  }
  return JSON.parse(JSON.stringify(DEFAULT_CONFIG));
}

async function saveConfig(cfg){
  try{
    localStorage.setItem(STORAGE_KEY, JSON.stringify(cfg));
    return true;
  }catch(e){
    console.error('Erro ao salvar', e);
    return false;
  }
}

// ---------- Clock ----------
function tickClock(){
  const el = document.getElementById('clock');
  const now = new Date();
  const hh = String(now.getHours()).padStart(2,'0');
  const mm = String(now.getMinutes()).padStart(2,'0');
  el.textContent = hh + ':' + mm;
}

// ---------- Rendering ----------
function applyBrand(){
  document.documentElement.style.setProperty('--accent', config.accent);
  document.getElementById('bizName').textContent = config.bizName;
  document.getElementById('logoCircle').textContent = (config.logoLetter || config.bizName[0] || 'A').toUpperCase();
}

function slideHTML(slide){
  const eyebrow = slide.eyebrow ? `<span class="slide-eyebrow">${escapeHTML(slide.eyebrow)}</span>` : '';
  const hasImg = slide.imageUrl && slide.imageUrl.trim().length > 0;

  if(slide.type === 'foto' && hasImg){
    return `
      <img class="slide-img full" src="${escapeAttr(slide.imageUrl)}" onerror="this.style.display='none'" />
      <div class="photo-overlay"></div>
      <div class="photo-caption">
        ${eyebrow}
        <div class="slide-title display-face">${escapeHTML(slide.title||'')}</div>
        <div class="slide-body">${escapeHTML(slide.body||'')}</div>
      </div>
    `;
  }

  if(slide.type === 'horario'){
    const lines = (slide.body || '').split('\n').filter(l => l.trim().length);
    const rows = lines.map(l=>{
      const parts = l.split(':');
      const day = parts.shift();
      const rest = parts.join(':').trim();
      return `<tr><td>${escapeHTML((day||'').trim())}</td><td>${escapeHTML(rest)}</td></tr>`;
    }).join('');
    return `
      <div class="slide-content">
        ${eyebrow}
        <div class="slide-title display-face">${escapeHTML(slide.title||'')}</div>
        <table class="schedule-table mono">${rows}</table>
      </div>
    `;
  }

  // promo / dica default layout
  return `
    <div class="slide-content">
      ${eyebrow}
      <div class="slide-title display-face">${escapeHTML(slide.title||'')}</div>
      <div class="slide-body">${escapeHTML(slide.body||'')}</div>
    </div>
    ${hasImg ? `<img class="slide-img" src="${escapeAttr(slide.imageUrl)}" onerror="this.style.display='none'" />` : ''}
  `;
}

function renderStage(){
  const stage = document.getElementById('stage');
  stage.innerHTML = '';
  config.slides.forEach((s, i)=>{
    const div = document.createElement('div');
    div.className = 'slide' + (i===0 ? ' active' : '');
    div.dataset.index = i;
    div.innerHTML = slideHTML(s);
    stage.appendChild(div);
  });
}

function renderSignalBars(){
  const wrap = document.getElementById('signalBars');
  wrap.innerHTML = '';
  config.slides.forEach((_, i)=>{
    const seg = document.createElement('div');
    seg.className = 'signal-seg';
    seg.innerHTML = '<div class="fill"></div>';
    wrap.appendChild(seg);
  });
}

function goToSlide(index){
  const slides = document.querySelectorAll('.slide');
  slides.forEach(s=>s.classList.remove('active'));
  if(slides[index]) slides[index].classList.add('active');
  currentSlide = index;

  const segs = document.querySelectorAll('.signal-seg');
  segs.forEach((seg, i)=>{
    seg.classList.toggle('done', i < index);
    const fill = seg.querySelector('.fill');
    if(i < index){ fill.style.width = '100%'; }
    else if(i > index){ fill.style.width = '0%'; }
  });
  segmentElapsedMs = 0;
}

function startRotation(){
  clearInterval(rotationTimer);
  clearInterval(segmentTimer);
  const totalMs = Math.max(4, config.intervalSeconds || 8) * 1000;
  segmentElapsedMs = 0;

  segmentTimer = setInterval(()=>{
    segmentElapsedMs += 100;
    const pct = Math.min(100, (segmentElapsedMs / totalMs) * 100);
    const segs = document.querySelectorAll('.signal-seg');
    if(segs[currentSlide]){
      segs[currentSlide].querySelector('.fill').style.width = pct + '%';
    }
  }, 100);

  rotationTimer = setInterval(()=>{
    const next = (currentSlide + 1) % config.slides.length;
    goToSlide(next);
  }, totalMs);
}

function escapeHTML(str){
  return String(str||'').replace(/[&<>"']/g, m => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[m]));
}
function escapeAttr(str){ return escapeHTML(str); }

// ---------- Edit panel ----------
function openEditPanel(){
  document.getElementById('f-bizName').value = config.bizName;
  document.getElementById('f-logoLetter').value = config.logoLetter;
  document.getElementById('f-accent').value = config.accent;
  document.getElementById('f-interval').value = config.intervalSeconds;
  renderSlidesList();
  document.getElementById('editOverlay').classList.add('open');
}
function closeEditPanel(){
  document.getElementById('editOverlay').classList.remove('open');
}

function renderSlidesList(){
  const list = document.getElementById('slidesList');
  list.innerHTML = '';
  config.slides.forEach((slide, idx)=>{
    const card = document.createElement('div');
    card.className = 'slide-card';
    card.innerHTML = `
      <div class="slide-card-head">
        <span>SLIDE ${idx+1}</span>
        <button class="btn btn-danger" data-remove="${idx}" type="button">Remover</button>
      </div>
      <div class="field-row">
        <div class="field" style="max-width:150px;">
          <label>Tipo</label>
          <select data-field="type" data-idx="${idx}">
            <option value="promo" ${slide.type==='promo'?'selected':''}>Promoção</option>
            <option value="dica" ${slide.type==='dica'?'selected':''}>Dica</option>
            <option value="foto" ${slide.type==='foto'?'selected':''}>Foto</option>
            <option value="horario" ${slide.type==='horario'?'selected':''}>Horário</option>
          </select>
        </div>
        <div class="field">
          <label>Etiqueta (ex: "Promoção do mês")</label>
          <input data-field="eyebrow" data-idx="${idx}" type="text" value="${escapeAttr(slide.eyebrow||'')}" />
        </div>
      </div>
      <div class="field" style="margin-bottom:14px;">
        <label>Título</label>
        <input data-field="title" data-idx="${idx}" type="text" value="${escapeAttr(slide.title||'')}" />
      </div>
      <div class="field" style="margin-bottom:14px;">
        <label>${slide.type==='horario' ? 'Linhas (uma por linha: Dia: Horário)' : 'Texto'}</label>
        <textarea data-field="body" data-idx="${idx}" rows="${slide.type==='horario'?4:3}">${escapeHTML(slide.body||'')}</textarea>
      </div>
      <div class="field">
        <label>Imagem</label>
        <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;">
          <label class="btn btn-ghost" style="cursor:pointer;">📷 Enviar do computador
            <input type="file" accept="image/*" data-imgfile="${idx}" style="display:none;" />
          </label>
          <input data-field="imageUrl" data-idx="${idx}" type="text" placeholder="ou cole um link (URL)" value="${slide.imageUrl && slide.imageUrl.startsWith('http') ? escapeAttr(slide.imageUrl) : ''}" style="flex:1;min-width:140px;" />
        </div>
        ${slide.imageUrl ? `<img src="${escapeAttr(slide.imageUrl)}" style="max-width:100%;max-height:80px;border-radius:6px;margin-top:8px;border:1px solid var(--line);" />` : ''}
      </div>
    `;
    list.appendChild(card);
  });

  list.querySelectorAll('[data-imgfile]').forEach(input=>{
    input.addEventListener('change', (e)=>{
      const idx = parseInt(e.target.dataset.imgfile);
      const file = e.target.files[0];
      if(!file) return;
      if(file.size > 900*1024){
        alert('Essa imagem é grande demais (máx. recomendado ~900KB). Tente uma foto mais leve, ou use um link (URL) em vez de enviar o arquivo.');
        return;
      }
      const reader = new FileReader();
      reader.onload = ()=>{
        config.slides[idx].imageUrl = reader.result;
        renderSlidesList();
      };
      reader.readAsDataURL(file);
    });
  });

  list.querySelectorAll('[data-field]').forEach(input=>{
    input.addEventListener('input', (e)=>{
      const idx = parseInt(e.target.dataset.idx);
      const field = e.target.dataset.field;
      config.slides[idx][field] = e.target.value;
    });
  });
  list.querySelectorAll('[data-remove]').forEach(btn=>{
    btn.addEventListener('click', (e)=>{
      const idx = parseInt(e.target.dataset.remove);
      config.slides.splice(idx, 1);
      renderSlidesList();
    });
  });
}

function addSlide(){
  config.slides.push({ type:'promo', eyebrow:'', title:'Novo slide', body:'', imageUrl:'' });
  renderSlidesList();
}

function loadTemplate(){
  const key = document.getElementById('f-template').value;
  if(!key || !TEMPLATES[key]) return;
  const ok = confirm('Isso vai substituir os slides atuais pelo modelo escolhido. Continuar?');
  if(!ok) return;
  const tpl = TEMPLATES[key];
  config.bizName = tpl.bizName;
  config.logoLetter = tpl.logoLetter;
  config.accent = tpl.accent;
  config.slides = JSON.parse(JSON.stringify(tpl.slides));
  document.getElementById('f-bizName').value = config.bizName;
  document.getElementById('f-logoLetter').value = config.logoLetter;
  document.getElementById('f-accent').value = config.accent;
  renderSlidesList();
}

function showToast(msg){
  const toast = document.getElementById('saveToast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(()=> toast.classList.remove('show'), 2200);
}

async function handleSave(){
  config.bizName = document.getElementById('f-bizName').value.trim() || 'Meu negócio';
  config.logoLetter = document.getElementById('f-logoLetter').value.trim() || config.bizName[0];
  config.accent = document.getElementById('f-accent').value;
  config.intervalSeconds = parseInt(document.getElementById('f-interval').value) || 8;
  if(config.slides.length === 0){
    config.slides.push({type:'promo', eyebrow:'', title:'Adicione seu primeiro slide', body:'', imageUrl:''});
  }

  const ok = await saveConfig(config);
  applyBrand();
  renderStage();
  renderSignalBars();
  goToSlide(0);
  startRotation();
  showToast(ok ? 'Salvo com sucesso.' : 'Não foi possível salvar agora — tente novamente.');
  closeEditPanel();
}

// ---------- Init ----------
async function init(){
  config = await loadConfig();
  applyBrand();
  renderStage();
  renderSignalBars();
  goToSlide(0);
  startRotation();
  tickClock();
  setInterval(tickClock, 15000);

  document.getElementById('gearBtn').addEventListener('click', openEditPanel);
  document.getElementById('closeEditBtn').addEventListener('click', closeEditPanel);
  document.getElementById('saveBtn').addEventListener('click', handleSave);
  document.getElementById('addSlideBtn').addEventListener('click', addSlide);
  document.getElementById('loadTemplateBtn').addEventListener('click', loadTemplate);
}

init();
</script>
</body>
</html>
